 models:
  - name: dim_listings_cleansed
    description: "A cleansed version of the listings data from Airbnb"
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 1000
          severity: error
          
    columns:
      - name: listing_id
        description: "Unique identifier for each listing"
        data_tests:
          - unique
          - not_null

      - name: host_id
        description: "Identifier for the host of each listing"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_hosts_cleansed')
              field: host_id

      - name: room_type
        description: "Type of room offered in the listing"
        data_tests:
          - accepted_values:
              values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']

      - name: minimum_nights
        description: '{{ doc("dim_listings_cleansed__minimum_nights") }}'
        data_tests:
          - positive_values

  - name: dim_hosts_cleansed
    description: "A cleansed version of the hosts data from Airbnb"
    config:
      contract:
        enforced: true 
    constraints:
      - type: primary_key
        columns: [host_id]
    columns:
      - name: host_id
        description: "Unique identifier for each host"
        data_type: integer
        constraints:
          - type: not_null
          - type: unique
        data_tests:
         - unique
         - not_null
      - name: host_name
        description: "Name of the host"
        data_type: string
        data_tests:
         - not_null
      - name: is_superhost
        description: "Indicates whether the host is a superhost"
        data_type: string
        data_tests:
         - accepted_values:
             values: ['t', 'f']
      - name: updated_at
        description: "Timestamp of the last update to the host's information"
        data_type: timestamp
      - name: created_at
        description: "Timestamp of when the host's information was created"
        data_type: timestamp
  - name: fact_reviews
    columns:
      - name: listing_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_listings_cleansed')
              field: listing_id
      - name: review_text
        data_tests:
          - not_null
        